name: CI - Release

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  build-images:
    uses: ./.github/workflows/build-image.yaml
    permissions:
      contents: read
      packages: write
    with:
      force_build: true
    secrets: inherit

  trivy-scan:
    needs: build-images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - ${{ needs.build-images.outputs.prediction_image }}
          - ${{ needs.build-images.outputs.training_image }}
          - ${{ needs.build-images.outputs.test_image }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Trivy security scan
        uses: ./.github/actions/trivy-scan
        with:
          image: ${{ matrix.image }}
