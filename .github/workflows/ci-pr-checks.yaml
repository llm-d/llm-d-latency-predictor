name: CI - PR Checks

on:
  pull_request:
    branches:
      - main

jobs:
  # Detect if PR contains code changes (skip expensive checks for docs-only PRs)
  check-code-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      has_code_changes: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Check for code changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '!docs/**'
              - '!**/*.md'
              - '!LICENSE'
              - '!OWNERS'

  # Python: lint
  python-lint:
    runs-on: ubuntu-latest
    needs: check-code-changes
    if: needs.check-code-changes.outputs.has_code_changes == 'true'
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check .

      - name: Run ruff format check
        run: ruff format --check .

  # Container: build all service Dockerfiles; push :pr-<num> tags only for
  # same-repo PRs (fork PRs build-only — GITHUB_TOKEN cannot write packages
  # from forks).
  container-build:
    runs-on: ubuntu-latest
    needs: check-code-changes
    if: needs.check-code-changes.outputs.has_code_changes == 'true'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - name: prediction-server
            dockerfile: Dockerfile-prediction
          - name: training-server
            dockerfile: Dockerfile-training
          - name: test
            dockerfile: Dockerfile-test
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Compute image metadata
        id: meta
        run: |
          repo="${GITHUB_REPOSITORY##*/}"
          echo "image_name=${repo}-${{ matrix.service.name }}" >> "$GITHUB_OUTPUT"
          if [[ "${{ github.event.pull_request.head.repo.full_name }}" == "${{ github.repository }}" ]]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        if: steps.meta.outputs.push == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.meta.outputs.push == 'true'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build ${{ matrix.service.name }} container (no push, fork PR)
        if: steps.meta.outputs.push == 'false'
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -f ${{ matrix.service.dockerfile }} \
            --tag test-build-${{ matrix.service.name }}:pr-${{ github.event.pull_request.number }} \
            .

      - name: Build and push ${{ matrix.service.name }} container (same-repo PR)
        if: steps.meta.outputs.push == 'true'
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --push \
            --annotation "index:org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --annotation "index:org.opencontainers.image.licenses=Apache-2.0" \
            -f ${{ matrix.service.dockerfile }} \
            -t ghcr.io/llm-d/${{ steps.meta.outputs.image_name }}:pr-${{ github.event.pull_request.number }} \
            .
