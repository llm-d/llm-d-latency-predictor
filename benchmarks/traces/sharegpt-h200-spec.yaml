workload:
  name: sharegpt-h200
  trace_type: real
  data_source: ShareGPT
  model: Qwen/Qwen3-32B-Instruct
  hardware:
    gpu: NVIDIA H200 (141GB)
    gpus_per_replica: 1
    decode_replicas: 2
    platform: Kubernetes v1.35
  serving:
    stack: llm-d modelservice (EPP + latency predictor sidecars + vLLM)
    epp_plugins: predicted-latency-slo-plugins
    max_model_len: 16384
    prefix_caching: disabled
  load:
    generator: inference-perf
    profile: chatbot_sharegpt
    api: completion (streaming)
    data:
      type: shareGPT
      input_tokens: {min: 4, max: 1488}
      output_tokens: {min: 1, max: 1024}
    stages:
      - {rate_qps: 1, duration_s: 120}
      - {rate_qps: 2, duration_s: 120}
      - {rate_qps: 4, duration_s: 120}
      - {rate_qps: 8, duration_s: 120}
      - {rate_qps: 16, duration_s: 120}
  analysis:
    seeds: 10
    split: 90/10 train/test per seed
    contention_gate_min_pct: 20
  known_limitations:
    - prefix_caching was disabled — prefix_cache_score is near-zero for 99% of samples
    - KV cache usage stays below 5% (large GPU + short prompts)
    - num_tokens_generated is 0 for all samples (captured at prefill time)
    - 50% of TTFT and 50% of TPOT values are 0 (prefill/decode phase split)
    - only 1.3% of prompts exceed 1000 tokens (ShareGPT is short-conversation heavy)
