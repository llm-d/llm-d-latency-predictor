workload:
  name: bimodal-h200
  trace_type: real
  data_source: bimodal_contention (inference-perf, custom profile)
  model: Qwen/Qwen3-32B-Instruct
  hardware:
    gpu: NVIDIA H200 (141GB)
    gpus_per_replica: 1
    decode_replicas: 2
    platform: Kubernetes v1.35
  serving:
    stack: llm-d modelservice (EPP + latency predictor sidecars + vLLM)
    epp_plugins: predicted-latency-slo-plugins
    max_model_len: 16384
    prefix_caching: disabled
  load:
    generator: inference-perf
    profile: bimodal_contention (mixed short + long requests)
    api: completion (streaming)
    data:
      type: synthetic (bimodal distribution)
      input_tokens: {min: 61, max: 12352, median: 3411}
      output_tokens: {min: 1, max: 1024}
    stages:
      - {rate_qps: 1, duration_s: 120}
      - {rate_qps: 2, duration_s: 120}
      - {rate_qps: 4, duration_s: 120}
      - {rate_qps: 8, duration_s: 120}
      - {rate_qps: 16, duration_s: 120}
  analysis:
    seeds: 10
    split: 90/10 train/test per seed
    contention_gate_min_pct: 20
  known_limitations:
    - prefix_caching was disabled — prefix_cache_score near-zero for 96.8% of samples
    - num_tokens_generated is 0 for all samples
    - 50% of TTFT and 50% of TPOT values are 0 (prefill/decode phase split)
    - extreme contention (median 116, max 452) — may not represent low-load production
