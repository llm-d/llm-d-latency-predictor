# Named workload specification — feature validation runs
# (Kaushik's PR #31 review: "model, hardware, input/output length
#  distribution, QPS, and specifically whether it's a real benchmark
#  trace or synthetic data")
workload:
  name: sharegpt-qwen3-32b-h200
  trace_type: real            # recorded from a live EPP + vLLM deployment
  data_source: ShareGPT       # real human/AI conversations
  model: Qwen/Qwen3-32B
  hardware:
    gpu: NVIDIA H200 (141GB)
    gpus_per_replica: 1
    decode_replicas: 2
    platform: CoreWeave CKS (Kubernetes v1.35)
  serving:
    stack: llm-d modelservice (EPP + latency predictor sidecars + vLLM)
    epp_plugins: predicted-latency-slo-plugins (predicted-latency-producer, latency-scorer, slo-headroom-tier-filter)
    max_model_len: 16000
    prefix_caching: disabled (--no-enable-prefix-caching)
  load:
    generator: inference-perf (llm-d-benchmark harness)
    profile: chatbot_sharegpt
    api: completion (streaming)
    data:
      type: shareGPT
      input_tokens: {min: 10, max: 1024}
      output_tokens: {min: 10, max: 1024}
    stages:
      - {rate_qps: 2, duration_s: 120}
      - {rate_qps: 4, duration_s: 120}
      - {rate_qps: 8, duration_s: 120}
      - {rate_qps: 12, duration_s: 120}
      - {rate_qps: 16, duration_s: 120}
  analysis:
    seeds: 10
    split: 90/10 train/test per seed
    contention_gate_min_pct: 20   # % samples with num_request_running > 1
