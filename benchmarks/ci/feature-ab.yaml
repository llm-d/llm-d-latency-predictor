# DRAFT — Proposal for v0.9.0 CI/CD Testing Automation milestone (#15)
#
# Offline A/B validation for latency predictor feature PRs.
# Runs on CPU using a frozen baseline trace — no GPU runner needed.
#
# To enable: move this file to .github/workflows/ and add as a required check.
# Requires a baseline trace committed at benchmarks/traces/baseline.jsonl.
#
# Context: https://github.com/llm-d/llm-d-latency-predictor/issues/15
# Contact: Greg Pereira (Gregory-Pereira) — CI epic owner

name: "Feature A/B Validation (draft)"

on:
  pull_request:
    paths:
      - 'prediction/**'
      - 'training/**'
      - 'common/**'
      - 'src/**'

jobs:
  offline-ab:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r benchmarks/requirements.txt

      - name: Run offline A/B validation
        run: |
          python benchmarks/run_validation.py \
            --trace benchmarks/traces/baseline.jsonl \
            --feature prefill_density \
            --seeds 5 \
            --json \
            --outdir /tmp/ab-results

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feature-ab-results
          path: /tmp/ab-results/
