# Canonical pre-commit configuration for llm-d repos
# Copy this file to the root of your repo
#
# Install: pip install pre-commit && pre-commit install
# Run all: pre-commit run --all-files

repos:
  # General file hygiene hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]  # allows custom YAML tags used in k8s
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-merge-conflict
      - id: mixed-line-ending
      - id: check-case-conflict

  # Python linting and formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  # Dependency pinning (uv pip compile with cross-platform support)
  # constraints.txt is compiled first from all .in files to ensure shared
  # packages (pandas, numpy, etc.) resolve to the same version across components.
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.9.30
    hooks:
      - id: pip-compile
        name: uv pip compile constraints
        args: [prediction/requirements.in, training/requirements.in, tests/requirements.in, -o, constraints.txt, --universal, --python-version, "3.11"]
        files: ^(prediction|training|tests)/requirements\.(in|txt)$
      - id: pip-compile
        name: uv pip compile prediction
        args: [prediction/requirements.in, -o, prediction/requirements.txt, --universal, --generate-hashes, --python-version, "3.11", -c, constraints.txt]
        files: ^(prediction/requirements\.(in|txt)|constraints\.txt)$
      - id: pip-compile
        name: uv pip compile training
        args: [training/requirements.in, -o, training/requirements.txt, --universal, --generate-hashes, --python-version, "3.11", -c, constraints.txt]
        files: ^(training/requirements\.(in|txt)|constraints\.txt)$
      - id: pip-compile
        name: uv pip compile tests
        args: [tests/requirements.in, -o, tests/requirements.txt, --universal, --generate-hashes, --python-version, "3.11", -c, constraints.txt]
        files: ^(tests/requirements\.(in|txt)|constraints\.txt)$

  # Shell script linting
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: [-x, --severity=warning]

  # Dockerfile linting
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint
        args: [--failure-threshold, error]

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.47.0
    hooks:
      - id: markdownlint
        args: [--fix]

  # YAML linting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.37.1
    hooks:
      - id: yamllint
        args:
          - -d
          - >-
            {extends: default, rules: {line-length: {max: 250},
            document-start: disable, truthy: {check-keys: false}}}
